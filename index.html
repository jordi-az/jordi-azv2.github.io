<!-- Styles -->
<style>
/* ========== Portfolio · adaptive light/dark ========== */
:root {
  --bg: #06070A;
  --bg-2: #0B0D12;
  --surface: #0F1218;
  --surface-2: #14181F;
  --border: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.14);
  --text: #F4F5F7;
  --text-mid: #B7BAC2;
  --text-dim: #6F7480;
  --cyan: #22D3EE;
  --cyan-soft: rgba(34,211,238,0.14);
  --violet: #A78BFA;
  --violet-soft: rgba(167,139,250,0.14);
  --pink: #F472B6;
  --green: #34D399;
  --amber: #FBBF24;
  --red: #F87171;
  --grad: linear-gradient(135deg, #22D3EE 0%, #A78BFA 60%, #F472B6 100%);
  --shadow-lg: 0 30px 80px -20px rgba(0,0,0,0.6), 0 8px 32px -8px rgba(0,0,0,0.5);
  --font-sans: 'Space Grotesk', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;
  --nav-indicator: rgba(255,255,255,0.08);
  --tech-logo-mono-filter: invert(1);
}

html[data-theme="light"] {
  --bg: #FAFAF9;
  --bg-2: #F0EFEC;
  --surface: #FFFFFF;
  --surface-2: #F2F1EE;
  --border: rgba(10,12,18,0.08);
  --border-strong: rgba(10,12,18,0.16);
  --text: #0B0D12;
  --text-mid: #3B3F47;
  --text-dim: #6B7280;
  --cyan: #0891B2;
  --cyan-soft: rgba(8,145,178,0.12);
  --violet: #7C3AED;
  --violet-soft: rgba(124,58,237,0.12);
  --pink: #DB2777;
  --green: #059669;
  --amber: #D97706;
  --red: #DC2626;
  --grad: linear-gradient(135deg, #0891B2 0%, #7C3AED 60%, #DB2777 100%);
  --shadow-lg: 0 30px 80px -28px rgba(10,12,18,0.18), 0 8px 32px -10px rgba(10,12,18,0.10);
  --nav-indicator: rgba(10,12,18,0.06);
  --tech-logo-mono-filter: none;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
html { scroll-behavior: auto; /* we use JS-driven smooth scroll for nav offsets */ }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-sans);
  font-feature-settings: "ss01", "ss02";
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background-color 320ms ease, color 320ms ease;
}

/* Background atmospherics */
.bg-fx {
  position: fixed; inset: 0; z-index: -1; pointer-events: none;
  overflow: hidden;
}
.bg-fx::before {
  content: ""; position: absolute; inset: -20%;
  background:
    radial-gradient(60% 50% at 22% 18%, rgba(34,211,238,0.10), transparent 60%),
    radial-gradient(45% 40% at 82% 28%, rgba(167,139,250,0.12), transparent 65%),
    radial-gradient(55% 50% at 50% 92%, rgba(244,114,182,0.08), transparent 70%);
  filter: blur(30px);
  animation: drift 24s ease-in-out infinite alternate;
}
html[data-theme="light"] .bg-fx::before {
  background:
    radial-gradient(60% 50% at 22% 18%, rgba(8,145,178,0.10), transparent 60%),
    radial-gradient(45% 40% at 82% 28%, rgba(124,58,237,0.10), transparent 65%),
    radial-gradient(55% 50% at 50% 92%, rgba(219,39,119,0.06), transparent 70%);
}
.bg-fx::after {
  content: ""; position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size: 56px 56px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 30%, transparent 80%);
  -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, #000 30%, transparent 80%);
}
html[data-theme="light"] .bg-fx::after {
  background-image:
    linear-gradient(rgba(10,12,18,0.045) 1px, transparent 1px),
    linear-gradient(90deg, rgba(10,12,18,0.045) 1px, transparent 1px);
}
@keyframes drift {
  0%   { transform: translate3d(0,0,0) rotate(0deg); }
  100% { transform: translate3d(2%, -1%, 0) rotate(4deg); }
}

/* Type */
h1, h2, h3, h4 { margin: 0; font-weight: 600; letter-spacing: -0.02em; }
.display { font-weight: 700; letter-spacing: -0.04em; line-height: 0.94; }
.eyebrow {
  font-family: var(--font-mono);
  font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--text-dim);
  display: inline-flex; align-items: center; gap: 10px;
}
.eyebrow::before {
  content: ""; width: 28px; height: 1px; background: currentColor; opacity: 0.5;
}
.gradient-text {
  background: var(--grad);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; color: transparent;
}

/* Layout */
.container { max-width: 1280px; margin: 0 auto; padding: 0 32px; }
@media (max-width: 720px) { .container { padding: 0 20px; } }

section.section {
  padding: 140px 0 80px;
  position: relative;
}

/* ===== Nav ===== */
.nav {
  position: fixed; top: 18px; left: 0; right: 0; z-index: 100;
  display: flex; justify-content: center; pointer-events: none;
}
.nav-inner {
  pointer-events: auto;
  position: relative;
  display: flex; align-items: center; gap: 2px;
  padding: 6px;
  border-radius: 999px;
  background: color-mix(in oklab, var(--surface) 78%, transparent);
  border: 1px solid var(--border);
  backdrop-filter: blur(20px) saturate(160%);
  -webkit-backdrop-filter: blur(20px) saturate(160%);
  box-shadow: 0 8px 32px -8px rgba(0,0,0,0.45);
  transition: background-color 240ms ease, border-color 240ms ease;
}
html[data-theme="light"] .nav-inner {
  box-shadow: 0 8px 24px -10px rgba(10,12,18,0.18);
}

/* Animated background indicator that slides under the active link */
.nav-indicator {
  position: absolute;
  top: 6px; bottom: 6px;
  left: 0; width: 0;
  border-radius: 999px;
  background: var(--nav-indicator);
  border: 1px solid var(--border);
  transition: transform 380ms cubic-bezier(.4,.0,.2,1),
              width 380ms cubic-bezier(.4,.0,.2,1),
              opacity 240ms ease;
  z-index: 0;
  pointer-events: none;
  opacity: 0;
}
.nav-indicator.in { opacity: 1; }

.nav-link {
  position: relative; z-index: 1;
  font-size: 13px; color: var(--text-mid); text-decoration: none;
  padding: 8px 14px; border-radius: 999px;
  transition: color 200ms ease;
  background: transparent;
  border: none;
  cursor: pointer;
  font-family: inherit;
  white-space: nowrap;
}
.nav-link:hover { color: var(--text); }
.nav-link.active { color: var(--text); }

.nav-link.cta {
  background: var(--text); color: var(--bg);
  font-weight: 500;
  padding: 8px 16px;
  margin-left: 4px;
  transition: background 200ms ease, color 200ms ease, transform 200ms ease;
}
.nav-link.cta:hover { background: var(--cyan); color: #06070A; transform: translateY(-1px); }

.nav-divider {
  width: 1px; height: 18px; background: var(--border-strong); opacity: 0.5;
  margin: 0 4px;
}

.theme-toggle {
  position: relative; z-index: 1;
  width: 34px; height: 34px;
  border-radius: 999px;
  border: none;
  background: transparent;
  color: var(--text-mid);
  display: inline-flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: color 200ms ease, background 200ms ease;
}
.theme-toggle:hover { color: var(--text); background: var(--nav-indicator); }
.theme-toggle svg { transition: transform 320ms ease; }
.theme-toggle:hover svg { transform: rotate(20deg); }

@media (max-width: 720px) {
  .nav-inner { padding: 5px; }
  .nav-link { padding: 7px 11px; font-size: 12px; }
  .nav .hide-sm { display: none; }
  .nav-divider { display: none; }
}

/* Buttons */
.btn {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 22px; border-radius: 999px;
  font-family: var(--font-sans); font-size: 15px; font-weight: 500;
  border: 1px solid var(--border-strong);
  background: var(--surface); color: var(--text);
  cursor: pointer; text-decoration: none;
  transition: transform 180ms, background 180ms, border-color 180ms, color 180ms;
}
.btn:hover { transform: translateY(-1px); border-color: var(--text); }
.btn-primary {
  background: var(--text); color: var(--bg); border-color: transparent;
}
.btn-primary:hover { background: var(--cyan); color: var(--bg); }
html[data-theme="light"] .btn-primary:hover { color: #fff; }
.btn-ghost { background: transparent; }

/* Cards */
.card {
  background: color-mix(in oklab, var(--surface) 92%, transparent);
  border: 1px solid var(--border);
  border-radius: 24px;
  position: relative; overflow: hidden;
}
.card-glow::before {
  content: ""; position: absolute; inset: -1px;
  border-radius: inherit; padding: 1px;
  background: linear-gradient(135deg, transparent 30%, rgba(34,211,238,0.4) 50%, transparent 70%);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude;
  opacity: 0; transition: opacity 320ms;
}
.card-glow:hover::before { opacity: 1; }

/* Reveal on scroll */
.reveal { opacity: 0; transform: translateY(28px); transition: opacity 800ms cubic-bezier(.2,.7,.2,1), transform 800ms cubic-bezier(.2,.7,.2,1); }
.reveal.in { opacity: 1; transform: translateY(0); }
.reveal.d1 { transition-delay: 80ms; }
.reveal.d2 { transition-delay: 160ms; }
.reveal.d3 { transition-delay: 240ms; }
.reveal.d4 { transition-delay: 320ms; }
.reveal.d5 { transition-delay: 400ms; }

/* Marquee */
.marquee {
  display: flex; gap: 56px;
  animation: marquee 38s linear infinite;
  width: max-content;
}
@keyframes marquee { to { transform: translateX(-50%); } }
.marquee-mask {
  overflow: hidden;
  mask-image: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent);
  -webkit-mask-image: linear-gradient(90deg, transparent, #000 12%, #000 88%, transparent);
}

/* Chip */
.chip {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 6px 12px; border-radius: 999px;
  border: 1px solid var(--border);
  background: var(--surface);
  font-family: var(--font-mono); font-size: 12px; font-weight: 500;
  color: var(--text-mid);
}
.chip svg { width: 14px; height: 14px; }
.chip .ico { width: 6px; height: 6px; border-radius: 999px; background: var(--cyan); box-shadow: 0 0 8px var(--cyan); }

/* Project section */
.project-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 80px; align-items: center;
  margin-bottom: 200px;
}
.project-row.flip { direction: rtl; }
.project-row.flip > * { direction: ltr; }
@media (max-width: 980px) {
  .project-row, .project-row.flip { grid-template-columns: 1fr; gap: 48px; direction: ltr; }
}

.project-meta { font-family: var(--font-mono); font-size: 12px; color: var(--text-dim); letter-spacing: 0.06em; }
.project-title { font-size: clamp(36px, 4.5vw, 56px); font-weight: 700; letter-spacing: -0.03em; line-height: 1; margin: 18px 0 22px; }
.project-desc { color: var(--text-mid); font-size: 17px; line-height: 1.55; max-width: 520px; }

.tag-row { display: flex; flex-wrap: wrap; gap: 8px; margin: 28px 0 28px; }
.tag {
  font-family: var(--font-mono); font-size: 11px;
  padding: 5px 10px; border-radius: 6px;
  background: var(--surface-2); color: var(--text-mid);
  border: 1px solid var(--border);
}
.tag.cyan { color: var(--cyan); border-color: rgba(34,211,238,0.3); background: var(--cyan-soft); }
.tag.violet { color: var(--violet); border-color: rgba(167,139,250,0.3); background: var(--violet-soft); }

/* Stage for demos */
.demo-stage {
  position: relative;
  display: flex; align-items: center; justify-content: center;
  min-height: 600px;
  border-radius: 28px;
}
.demo-stage::before {
  content: ""; position: absolute; inset: 0;
  background: radial-gradient(50% 50% at 50% 50%, var(--cyan-soft), transparent 70%);
  filter: blur(40px);
}
.demo-stage.violet::before { background: radial-gradient(50% 50% at 50% 50%, var(--violet-soft), transparent 70%); }
.demo-stage > * { position: relative; z-index: 1; }

/* Timeline */
.timeline {
  position: relative;
  padding-left: 28px;
}
.timeline::before {
  content: ""; position: absolute; left: 9px; top: 0; bottom: 0;
  width: 2px; background: linear-gradient(180deg, transparent, var(--border-strong) 20%, var(--border-strong) 80%, transparent);
}
.tl-item { position: relative; padding-bottom: 56px; }
.tl-item:last-child { padding-bottom: 0; }
.tl-dot {
  position: absolute; left: -28px; top: 6px;
  width: 20px; height: 20px; border-radius: 999px;
  background: var(--bg);
  border: 2px solid var(--cyan);
  box-shadow: 0 0 0 4px var(--bg), 0 0 14px var(--cyan-soft);
}
.tl-item.active .tl-dot { background: var(--cyan); }
.tl-when { font-family: var(--font-mono); font-size: 12px; color: var(--cyan); letter-spacing: 0.08em; }
.tl-role { font-size: 22px; font-weight: 600; margin: 4px 0 4px; letter-spacing: -0.02em; }
.tl-where { font-size: 14px; color: var(--text-mid); margin-bottom: 12px; }
.tl-desc { color: var(--text-mid); font-size: 15px; line-height: 1.55; max-width: 600px; }

/* Stack grid */
.stack-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 14px;
}
.stack-cell {
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  padding: 22px 12px; border-radius: 16px;
  background: var(--surface); border: 1px solid var(--border);
  text-align: center;
  transition: transform 280ms, border-color 280ms, background 280ms;
}
.stack-cell:hover { transform: translateY(-4px); border-color: var(--border-strong); background: var(--surface-2); }
.stack-cell .icon { width: 32px; height: 32px; display: grid; place-items: center; }
.stack-cell .icon img.tech-logo { width: 32px; height: 32px; display: block; object-fit: contain; }
.stack-cell .icon img.tech-logo.mono { filter: var(--tech-logo-mono-filter); }
.stack-cell .name { font-size: 13px; font-weight: 500; }
.stack-cell .kind { font-family: var(--font-mono); font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; }

/* Footer */
.footer {
  border-top: 1px solid var(--border);
  padding: 48px 0 64px;
  margin-top: 80px;
}

/* Hero specific */
.hero-name { font-size: clamp(60px, 11vw, 168px); }

/* Utility */
.text-mid { color: var(--text-mid); }
.text-dim { color: var(--text-dim); }
.mono { font-family: var(--font-mono); }

/* Demo internal styles */
.demo-shadow { filter: drop-shadow(0 40px 80px rgba(0,0,0,0.45)); }
html[data-theme="light"] .demo-shadow { filter: drop-shadow(0 30px 60px rgba(10,12,18,0.25)); }

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* ===== Leaflet · GeoMonitor markers ===== */
.leaflet-container {
  background: #0A1118 !important;
  font-family: var(--font-sans) !important;
}
.leaflet-control-attribution {
  background: rgba(10,17,24,0.65) !important;
  color: rgba(255,255,255,0.7) !important;
  font-size: 9px !important;
  padding: 2px 6px !important;
  font-family: var(--font-mono) !important;
}
.leaflet-control-attribution a { color: rgba(34,211,238,0.85) !important; }
.leaflet-control-zoom a {
  background: rgba(11,17,28,0.85) !important;
  color: #22D3EE !important;
  border: 1px solid rgba(34,211,238,0.2) !important;
  backdrop-filter: blur(10px);
}
.leaflet-control-zoom a:hover {
  background: rgba(34,211,238,0.15) !important;
}

/* Custom worker marker (divIcon) */
.worker-divicon {
  background: transparent !important;
  border: none !important;
  overflow: visible !important;
}
.worker-marker {
  position: relative;
  width: 18px; height: 18px;
  pointer-events: auto;
}
.worker-marker .worker-pulse,
.worker-marker .worker-pulse-2 {
  position: absolute;
  top: 50%; left: 50%;
  width: 18px; height: 18px;
  margin: -9px 0 0 -9px;
  border-radius: 50%;
  background: var(--worker-color, #10B981);
  opacity: 0.45;
  animation: worker-pulse 1.8s cubic-bezier(.4,.0,.2,1) infinite;
  pointer-events: none;
}
.worker-marker .worker-pulse-2 {
  animation-delay: 0.9s;
}
.worker-marker .worker-dot {
  position: absolute;
  top: 50%; left: 50%;
  width: 14px; height: 14px;
  margin: -7px 0 0 -7px;
  border-radius: 50%;
  background: var(--worker-color, #10B981);
  border: 2.5px solid #0A1118;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.45);
  z-index: 2;
}
.worker-marker.alert .worker-badge {
  position: absolute;
  top: -2px; right: -3px;
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #EF4444;
  border: 1.5px solid #0A1118;
  z-index: 3;
  animation: worker-blink 1.2s ease-in-out infinite;
}
.worker-marker.active .worker-dot {
  background: #22D3EE;
  box-shadow: 0 0 0 1px rgba(0,0,0,0.4), 0 0 14px rgba(34,211,238,0.9);
}
@keyframes worker-pulse {
  0%   { transform: scale(0.7); opacity: 0.55; }
  80%  { opacity: 0; }
  100% { transform: scale(3.4); opacity: 0; }
}
@keyframes worker-blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

.worker-tooltip {
  background: rgba(11,17,28,0.92) !important;
  border: 1px solid rgba(34,211,238,0.3) !important;
  color: #fff !important;
  padding: 6px 10px !important;
  border-radius: 8px !important;
  font-family: var(--font-mono) !important;
  font-size: 11px !important;
  box-shadow: 0 6px 16px rgba(0,0,0,0.45) !important;
}
.worker-tooltip::before { display: none !important; }
.leaflet-tooltip-top.worker-tooltip::before,
.leaflet-tooltip-bottom.worker-tooltip::before { display: none !important; }

</style>

<!-- Initial theme (system pref + saved override) -->
<script>
  (function () {
    try {
      var saved = localStorage.getItem('portfolio-theme');
      var theme;
      if (saved === 'light' || saved === 'dark') {
        theme = saved;
      } else {
        theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      }
      document.documentElement.dataset.theme = theme;
    } catch (e) {
      document.documentElement.dataset.theme = 'dark';
    }
  })();
</script>

<!-- Tweak defaults (design-time only) -->
<script>
  window.__tweakDefaults = {};
</script>

<!-- Shared store (GeoTrack <-> GeoMonitor) -->
<script>
// shared-store.js — tiny pub/sub store shared across demos (vanilla, no React).
// GeoTrack publishes its "active employee" position; GeoMonitor subscribes
// and renders the marker on the live map.

(function () {
  if (window.__demoStore) return;

  var listeners = new Set();
  var state = {
    activeEmployee: null, // { id, name, lat, lng, city, color, startedAt }
  };

  function notify() {
    listeners.forEach(function (fn) {
      try { fn(state); } catch (e) { /* swallow */ }
    });
  }

  // Random-but-plausible point inside Madrid or Barcelona
  var CITY_TEMPLATES = {
    Madrid: {
      center: [40.4168, -3.7038],
      radius: 0.035,
      streets: [
        'Calle Gran Vía, 32',
        'Paseo de la Castellana, 89',
        'Calle de Alcalá, 142',
        'Calle de Serrano, 56',
        'Plaza Mayor, 4',
        'Calle de Atocha, 90',
      ],
    },
    Barcelona: {
      center: [41.3851, 2.1734],
      radius: 0.030,
      streets: [
        'Av. Diagonal, 477',
        'Pg. de Gràcia, 92',
        'Carrer de Balmes, 145',
        'Av. Meridiana, 350',
        'Rambla de Catalunya, 60',
        'Carrer d\u2019Aragó, 282',
      ],
    },
  };

  function randomEmployeeLocation() {
    var cityName = Math.random() > 0.5 ? 'Madrid' : 'Barcelona';
    var c = CITY_TEMPLATES[cityName];
    // Uniform-ish point in a small box around the center
    var lat = c.center[0] + (Math.random() - 0.5) * c.radius * 2;
    var lng = c.center[1] + (Math.random() - 0.5) * c.radius * 2;
    var street = c.streets[Math.floor(Math.random() * c.streets.length)];
    return {
      lat: +lat.toFixed(5),
      lng: +lng.toFixed(5),
      city: cityName,
      address: street + ' · ' + cityName,
    };
  }

  window.__demoStore = {
    getState: function () { return state; },

    randomEmployeeLocation: randomEmployeeLocation,

    setActiveEmployee: function (emp) {
      state.activeEmployee = emp;
      notify();
    },

    clearActiveEmployee: function () {
      state.activeEmployee = null;
      notify();
    },

    subscribe: function (fn) {
      listeners.add(fn);
      return function () { listeners.delete(fn); };
    },
  };
})();

          {key('', { flex: true, k: 'space' })}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  // Auto-inject a rail toggle when a <deck-stage> is on the page. The
  // toggle drives the deck's per-viewer _railVisible via window message;
  // state is mirrored from the same localStorage key the deck reads so
  // the control reflects reality across reloads. The mechanism is the
  // message — authors who want custom placement can post it directly
  // and pass noDeckControls to suppress this one.
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  // deck-stage enables its rail in connectedCallback, but this panel can
  // mount before that element has upgraded. The initial read catches the
  // common case; the listener covers mounting first. (Older deck-stage.js
  // copies still wait for the host's __omelette_rail_enabled postMessage —
  // same listener handles those.)
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>

// ─── Leaflet Spain Map ───────────────────────────────────────
// Satellite imagery (Esri World Imagery) + place-name labels (Esri reference layer)
// = "Hybrid" feel without roads. Pan + zoom enabled.
function LeafletSpainMap({ workers, focusOn }) {
  const containerRef = gmUseRef(null);
  const mapRef = gmUseRef(null);
  const markersRef = gmUseRef(new Map());
  const headingsRef = gmUseRef(new Map());
  const initializedRef = gmUseRef(false);

  // Initialize map once Leaflet is ready
  gmUseEffect(() => {
    if (initializedRef.current) return;

    const tryInit = () => {
      if (!window.L || !containerRef.current) {
        // Leaflet not ready yet — retry shortly
        return false;
      }

      const L = window.L;
      const map = L.map(containerRef.current, {
        center: [40.2, -3.5],       // Spain center-ish
        zoom: 6,
        minZoom: 5,
        maxZoom: 18,
        zoomControl: false,
        attributionControl: true,
        worldCopyJump: false,
        scrollWheelZoom: true,
        // Slight inertia + smooth zoom
        zoomSnap: 0.25,
        zoomDelta: 0.5,
        wheelPxPerZoomLevel: 120,
      });

      // Satellite imagery
      L.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
        {
          attribution: 'Imagery © Esri',
          maxZoom: 19,
        }
      ).addTo(map);

      // Boundaries + place labels (hybrid feel, no road network)
      L.tileLayer(
        'https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}',
        {
          attribution: 'Labels © Esri',
          maxZoom: 19,
          opacity: 0.85,
        }
      ).addTo(map);

      // Zoom control in a non-conflicting spot
      L.control.zoom({ position: 'bottomleft' }).addTo(map);

      mapRef.current = map;
      initializedRef.current = true;

      // Leaflet sometimes needs a nudge if the container was hidden/scaled
      setTimeout(() => map.invalidateSize(), 100);

      return true;
    };

    if (!tryInit()) {
      // Poll until Leaflet's script finishes loading
      const id = setInterval(() => { if (tryInit()) clearInterval(id); }, 100);
      return () => clearInterval(id);
    }

    return () => {
      if (mapRef.current) {
        mapRef.current.remove();
        mapRef.current = null;
        initializedRef.current = false;
        markersRef.current.clear();
        headingsRef.current.clear();
      }
    };
  }, []);

  // Sync markers when workers change
  gmUseEffect(() => {
    const map = mapRef.current;
    if (!map || !window.L) return;
    const L = window.L;

    const presentIds = new Set();

    workers.forEach((w) => {
      presentIds.add(w.id);
      let entry = markersRef.current.get(w.id);

      const html =
        '<div class="worker-marker' + (w.alert ? ' alert' : '') + (w.live ? ' active' : '') + '" style="--worker-color: ' + w.color + '">' +
          '<div class="worker-pulse"></div>' +
          '<div class="worker-pulse-2"></div>' +
          '<div class="worker-dot"></div>' +
          (w.alert ? '<div class="worker-badge"></div>' : '') +
        '</div>';

      const icon = L.divIcon({
        className: 'worker-divicon',
        html,
        iconSize: [18, 18],
        iconAnchor: [9, 9],
      });

      if (!entry) {
        const marker = L.marker([w.lat, w.lng], { icon, riseOnHover: true }).addTo(map);
        marker.bindTooltip(
          '<strong>' + w.name + '</strong><br>' + w.city + (w.live ? ' · EN JORNADA' : ''),
          { direction: 'top', offset: [0, -10], className: 'worker-tooltip' }
        );
        markersRef.current.set(w.id, { marker, baseLat: w.lat, baseLng: w.lng });
      } else {
        // Position update + icon refresh (for color/state changes)
        entry.marker.setIcon(icon);
        entry.marker.setLatLng([w.lat, w.lng]);
        entry.marker.setTooltipContent(
          '<strong>' + w.name + '</strong><br>' + w.city + (w.live ? ' · EN JORNADA' : '')
        );
        entry.baseLat = w.lat;
        entry.baseLng = w.lng;
      }
    });

    // Remove markers for workers that are no longer present
    markersRef.current.forEach((entry, id) => {
      if (!presentIds.has(id)) {
        map.removeLayer(entry.marker);
        markersRef.current.delete(id);
        headingsRef.current.delete(id);
      }
    });
  }, [workers]);

  // Smooth pan when a GeoTrack employee starts a new jornada
  gmUseEffect(() => {
    const map = mapRef.current;
    if (!map || !focusOn) return;
    // Wait a tick so the marker has been added
    const id = setTimeout(() => {
      try {
        map.flyTo([focusOn.lat, focusOn.lng], 11, { duration: 1.8, easeLinearity: 0.25 });
      } catch (e) {}
    }, 250);
    return () => clearTimeout(id);
  }, [focusOn ? focusOn.id + ':' + focusOn.startedAt : null]);

  // Subtle drift movement to make workers feel alive
  gmUseEffect(() => {
    const tickId = setInterval(() => {
      const map = mapRef.current;
      if (!map) return;

      markersRef.current.forEach((entry, workerId) => {
        // Wander steering: small turn each tick
        let heading = headingsRef.current.get(workerId);
        if (heading === undefined) {
          heading = Math.random() * Math.PI * 2;
        }
        heading += (Math.random() - 0.5) * 0.8;
        headingsRef.current.set(workerId, heading);

        const speed = 0.00045; // ~50m per tick at this latitude
        const ll = entry.marker.getLatLng();
        let lat = ll.lat + Math.cos(heading) * speed;
        let lng = ll.lng + Math.sin(heading) * speed;

        // Keep drift loosely tethered to the base position (don't wander too far)
        const dLat = lat - entry.baseLat;
        const dLng = lng - entry.baseLng;
        const maxR = 0.012; // ~1.3 km
        const d = Math.sqrt(dLat * dLat + dLng * dLng);
        if (d > maxR) {
          // Pull back toward base
          lat = entry.baseLat + (dLat / d) * maxR * 0.8;
          lng = entry.baseLng + (dLng / d) * maxR * 0.8;
          headingsRef.current.set(workerId, heading + Math.PI); // turn around
        }

        entry.marker.setLatLng([lat, lng]);
      });
    }, 1400);

    return () => clearInterval(tickId);
  }, []);

  return (
    <div
      ref={containerRef}
      style={{ position: 'absolute', inset: 0, zIndex: 0, background: '#0A1118' }}
    />
  );
}

<script type="text/babel">

// Uses globals: ChromeWindow
const { useState: waUseState, useEffect: waUseEffect, useRef: waUseRef } = React;

const SCRIPT = [
  { side: 'client', t: 'Hola, tengo un problema con el aire acondicionado del local. No enfría desde anoche.', time: '10:42', creates: true },
  { side: 'agent', t: '¡Hola! Soy Aura 👋 te ayudo. ¿Me confirmas el código de instalación? Suele estar en el albarán.', time: '10:43' },
  { side: 'client', t: 'Sí, es INST-4471', time: '10:43' },
  { side: 'agent', t: 'Perfecto, abro un caso ahora mismo. ¿Prioridad alta? te enviaría un técnico hoy mismo.', time: '10:43' },
  { side: 'client', t: 'Sí por favor, es urgente. Tenemos clientes.', time: '10:43' },
  { side: 'agent', t: 'Hecho ✅ Caso CAS-00892 creado. Marc estará por la tarde entre las 16:00–18:00. Te llega un SMS de confirmación.', time: '10:42' },
];

function WhatsAppDemo() {
  const [step, setStep] = waUseState(0);
  const scrollRef = waUseRef(null);
  const desktopScrollRef = waUseRef(null);

  waUseEffect(() => {
    if (step >= SCRIPT.length) {
      const id = setTimeout(() => setStep(0), 5200);
      return () => clearTimeout(id);
    }
    const delay = step === 0 ? 900 : (SCRIPT[step]?.side === 'agent' ? 1900 : 1500);
    const id = setTimeout(() => setStep(s => s + 1), delay);
    return () => clearTimeout(id);
  }, [step]);

  waUseEffect(() => {
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
    if (desktopScrollRef.current) desktopScrollRef.current.scrollTop = desktopScrollRef.current.scrollHeight;
  }, [step]);

  const visible = SCRIPT.slice(0, step);
  const next = SCRIPT[step];
  const caseCreated = visible.some(m => m.creates);

  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 28, width: '100%' }}>
      {/* Mobile Aura · Soporte — caja con tamaño real escalado para evitar separación visual excesiva */}

        <div style={{ transform: 'scale(0.72)', transformOrigin: 'top left' }}>

            <WAChat messages={visible} typing={next?.side === 'agent'} scrollRef={scrollRef}/>
          </PhoneShell>
        </div>
      </div>

      <div className="demo-shadow" style={{ width: 582, height: 358, marginBottom: -68, flex: '0 0 auto' }}>
        <div style={{ transform: 'scale(0.56)', transformOrigin: 'top left' }}>

            activeIndex={0}
            url="serviceconsole.salesforce.com"

            height={640}
          >
            <SFConsole caseCreated={caseCreated} step={step} messages={visible} typing={next?.side === 'agent'} desktopScrollRef={desktopScrollRef}/>
          </ChromeWindow>
        </div>
      </div>
    </div>
  );
}

<!-- App -->
<script type="text/babel">
// app.jsx — main App component, nav (with scroll-spy + animated indicator + theme toggle),
// hero, projects, stack, timeline, contact, footer.
// Uses globals: GeoTrackDemo, GeoMonitorDemo, WhatsAppDemo, MiStockDemo
const { useState, useEffect, useRef, useMemo, useLayoutEffect, useCallback } = React;

// ─── Theme hook ───────────────────────────────────────────────
// Reads localStorage first, then falls back to the OS preference.
// Listens to system changes too — if the user hasn't picked a theme manually,
// the page follows the OS.
function useTheme() {
  const getInitial = () => {
    // The inline script in Portfolio.html already set data-theme; read that.
    if (typeof document !== 'undefined' && document.documentElement.dataset.theme) {
      return document.documentElement.dataset.theme;
    }
    return 'dark';
  };

  const [theme, setThemeState] = useState(getInitial);
  // Track whether the user explicitly picked one (so we only auto-follow OS otherwise)
  const userOverride = useRef(
    typeof localStorage !== 'undefined' && !!localStorage.getItem('portfolio-theme')
  );

  useEffect(() => {
    document.documentElement.dataset.theme = theme;
  }, [theme]);

  // Listen to OS preference changes
  useEffect(() => {
    if (!window.matchMedia) return;
    const mq = window.matchMedia('(prefers-color-scheme: light)');
    const handler = (e) => {
      if (!userOverride.current) {
        setThemeState(e.matches ? 'light' : 'dark');
      }
    };
    // Some browsers use addEventListener, older Safari uses addListener
    if (mq.addEventListener) mq.addEventListener('change', handler);
    else mq.addListener(handler);
    return () => {
      if (mq.removeEventListener) mq.removeEventListener('change', handler);
      else mq.removeListener(handler);
    };
  }, []);

  const setTheme = useCallback((next) => {
    userOverride.current = true;
    try { localStorage.setItem('portfolio-theme', next); } catch (e) {}
    setThemeState(next);
  }, []);

  const toggleTheme = useCallback(() => {
    setTheme(theme === 'dark' ? 'light' : 'dark');
  }, [theme, setTheme]);

  return { theme, setTheme, toggleTheme };
}

// ─── Scroll reveal hook ───────────────────────────────────────
function useReveal() {
  useEffect(() => {
    const io = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('in'); });
    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });
    document.querySelectorAll('.reveal').forEach(el => io.observe(el));
    return () => io.disconnect();
  }, []);
}

// ─── Smooth scroll helper ─────────────────────────────────────
function smoothScrollTo(id) {
  if (id === 'inicio' || id === 'top') {
    window.scrollTo({ top: 0, behavior: 'smooth' });
    return;
  }
  const el = document.getElementById(id);
  if (!el) return;
  // account for the floating nav (~80px) so the section heading isn't hidden
  const offset = 90;
  const top = el.getBoundingClientRect().top + window.pageYOffset - offset;
  window.scrollTo({ top, behavior: 'smooth' });
}

// ─── Nav ──────────────────────────────────────────────────────
const NAV_ITEMS = [
  { id: 'inicio',      label: 'Inicio' },
  { id: 'trabajos',    label: 'Trabajos' },
  { id: 'stack',       label: 'Stack', smOnly: false, hideSm: true },
  { id: 'trayectoria', label: 'Trayectoria', hideSm: true },
];

function Nav({ theme, onToggleTheme }) {
  const [active, setActive] = useState('inicio');
  const innerRef = useRef(null);
  const indicatorRef = useRef(null);
  const linkRefs = useRef({});

  // Scroll-spy: detect which section is in view
  useEffect(() => {
    const sectionIds = ['inicio', 'trabajos', 'stack', 'trayectoria', 'contacto'];
    const sections = sectionIds
      .map(id => ({ id, el: document.getElementById(id) }))
      .filter(s => s.el);

    if (!sections.length) return;

    const observer = new IntersectionObserver(
      (entries) => {
        // Pick the entry closest to the top that is intersecting
        const visible = entries
          .filter(e => e.isIntersecting)
          .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
        if (visible.length) {
          setActive(visible[0].target.id);
        }
      },
      { rootMargin: '-35% 0px -55% 0px', threshold: 0 }
    );

    sections.forEach(s => observer.observe(s.el));

    // Also handle the very top (above any section) → "inicio"
    const onScroll = () => {
      if (window.scrollY < 120) setActive('inicio');
    };
    window.addEventListener('scroll', onScroll, { passive: true });

    return () => {
      observer.disconnect();
      window.removeEventListener('scroll', onScroll);
    };
  }, []);

  // Slide the indicator under the active link
  useLayoutEffect(() => {
    const linkEl = linkRefs.current[active];
    const innerEl = innerRef.current;
    const indEl = indicatorRef.current;
    if (!linkEl || !innerEl || !indEl) {
      if (indEl) indEl.classList.remove('in');
      return;
    }
    const lr = linkEl.getBoundingClientRect();
    const ir = innerEl.getBoundingClientRect();
    indEl.style.width = `${lr.width}px`;
    indEl.style.transform = `translateX(${lr.left - ir.left}px)`;
    indEl.classList.add('in');
  }, [active]);

  // Re-position on resize
  useEffect(() => {
    const reposition = () => {
      const linkEl = linkRefs.current[active];
      const innerEl = innerRef.current;
      const indEl = indicatorRef.current;
      if (!linkEl || !innerEl || !indEl) return;
      const lr = linkEl.getBoundingClientRect();
      const ir = innerEl.getBoundingClientRect();
      indEl.style.width = `${lr.width}px`;
      indEl.style.transform = `translateX(${lr.left - ir.left}px)`;
    };
    window.addEventListener('resize', reposition);
    return () => window.removeEventListener('resize', reposition);
  }, [active]);

  const onClickLink = (e, id) => {
    e.preventDefault();
    setActive(id);
    smoothScrollTo(id);
  };

  return (
    <nav className="nav" aria-label="Navegación principal">
      <div className="nav-inner" ref={innerRef}>
        <span className="nav-indicator" ref={indicatorRef}></span>

        {NAV_ITEMS.map(it => (
          <a
            key={it.id}
            ref={el => { if (el) linkRefs.current[it.id] = el; }}

// Public brand SVGs loaded from Simple Icons CDN.
function simpleIcon(slug, color) {
  return `https://cdn.simpleicons.org/${slug}/${color}`;
}

function TechIcon({ src, label, mono = false, fallback }) {
  const [failed, setFailed] = React.useState(false);
  const initials = fallback || label
    .split(/[^A-Za-z0-9]+/)
    .filter(Boolean)
    .slice(0, 2)
    .map((word) => word[0])
    .join('')
    .toUpperCase();

  return (
    <div className="icon" title={`${label} logo`}>
      {failed ? (
        <div style={{
          width: 32,
          height: 32,
          borderRadius: 10,
          display: 'grid',
          placeItems: 'center',
          border: '1px solid var(--border-strong)',
          fontFamily: 'var(--font-mono)',
          fontWeight: 700,
          fontSize: 11,
          color: 'var(--text)'
        }}>{initials}</div>
      ) : (
        <img
          className={`tech-logo ${mono ? 'mono' : ''}`}
          src={src}
          alt={`${label} logo`}
          loading="lazy"
          referrerPolicy="no-referrer"
          onError={() => setFailed(true)}
        />
      )}
    </div>
  );
}
